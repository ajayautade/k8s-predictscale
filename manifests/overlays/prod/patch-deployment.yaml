apiVersion: apps/v1
kind: Deployment
metadata:
  name: predictscale
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: predictscale
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: predictscale
