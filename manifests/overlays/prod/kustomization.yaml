apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - path: patch-deployment.yaml
    target:
      kind: Deployment
      name: predictscale

configMapGenerator:
  - name: predictscale-config
    behavior: merge
    literals:
      - LOG_LEVEL=WARNING
      - DRY_RUN=false
      - ALERT_ENABLED=true
