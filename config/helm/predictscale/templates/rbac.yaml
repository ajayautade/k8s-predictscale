{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "predictscale.fullname" . }}-scaler
  labels:
    {{- include "predictscale.labels" . | nindent 4 }}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "predictscale.fullname" . }}-scaler-binding
  labels:
    {{- include "predictscale.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "predictscale.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "predictscale.fullname" . }}-scaler
  apiGroup: rbac.authorization.k8s.io
{{- end }}
